<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakapone AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131314] text-[#e3e3e3] h-screen flex flex-col font-sans text-sm">
    <header class="h-12 border-b border-[#444746] flex items-center px-4 bg-[#1e1f20]">
        <div class="font-medium">Kakapone AI</div>
    </header>

    <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4 max-w-3xl mx-auto w-full"></div>

    <div class="p-4 bg-[#131314] border-t border-[#444746]">
        <div class="max-w-3xl mx-auto flex gap-2 items-center bg-[#1e1f20] border border-[#444746] rounded-2xl p-1 focus-within:border-[#a8c7fa]">
            <input id="user-input" type="text" class="flex-1 bg-transparent border-none outline-none px-4 py-2" placeholder="カカポネに問いかける...">
            <button onclick="sendMessage()" id="send-btn" class="p-2 text-[#a8c7fa]">
                <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // あなたの有効なAPIキー
        const API_KEY = "AIzaSyCsq4putpU9vTZdQIwayRS4nDK28j1wIzo"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        // AI Studioの「Thinking」と「Search」をブラウザ形式で指定
        const model = genAI.getGenerativeModel({ 
            model: "gemini-2.0-flash-thinking-exp-01-21",
            tools: [{ googleSearch: {} }]
        });

        const chat = model.startChat();

        window.sendMessage = async () => {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();
            if (!text || btn.disabled) return;

            // ユーザー側の表示
            chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-[#333537] px-4 py-2 rounded-2xl max-w-[85%]">${text}</div></div>`;
            input.value = '';
            btn.disabled = true;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const result = await chat.sendMessage(text);
                const response = await result.response;
                // AI側の表示
                chatBox.innerHTML += `<div class="flex justify-start"><div class="leading-relaxed whitespace-pre-wrap w-full">${response.text()}</div></div>`;
            } catch (e) {
                console.error(e);
                chatBox.innerHTML += `<div class="text-red-400 text-center text-xs">接続エラー。APIキーの権限を確認してください。</div>`;
            }
            btn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        };
        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
