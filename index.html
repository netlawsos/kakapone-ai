<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Google AI Studio Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-[#131314] text-[#e3e3e3] h-screen flex flex-col font-sans">
    <div class="flex-1 overflow-y-auto p-4" id="chat-history"></div>
    <div class="p-4 bg-[#1e1f20] border-t border-[#444746]">
      <div class="max-w-4xl mx-auto flex gap-2">
        <input type="text" id="user-input" class="flex-1 bg-[#131314] border border-[#444746] rounded-xl px-4 py-3 outline-none focus:border-[#a8c7fa]" placeholder="Type a message...">
        <button id="send-button" class="text-[#a8c7fa] p-2 hover:bg-[#333537] rounded-full">
          <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
      </div>
    </div>

    <script type="module">
      import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

      const genAI = new GoogleGenerativeAI("AIzaSyCsq4putpU9vTZdQIwayRS4nDK28j1wIzo");
      const model = genAI.getGenerativeModel({ 
        model: "gemini-1.5-flash",
        systemInstruction: "あなたはカカポネです。論理的で構造的な回答を行い、文末にたまにオウムの絵文字を添えてください。Google検索を使用して最新情勢を分析してください。",
        tools: [{ googleSearch: {} }]
      });

      let chat = model.startChat({ history: [] });

      async function sendMessage() {
        const input = document.getElementById('user-input');
        const history = document.getElementById('chat-history');
        const text = input.value.trim();
        if (!text) return;

        history.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-[#333537] px-4 py-2 rounded-2xl max-w-[80%]">${text}</div></div>`;
        input.value = '';

        try {
          const result = await chat.sendMessage(text);
          const response = await result.response;
          history.innerHTML += `<div class="flex justify-start mb-4"><div class="max-w-[90%] whitespace-pre-wrap">${response.text()}</div></div>`;
        } catch (e) {
          history.innerHTML += `<div class="text-red-400 text-center text-xs">Error: Check API Key or permissions.</div>`;
        }
        history.scrollTop = history.scrollHeight;
      }

      document.getElementById('send-button').onclick = sendMessage;
      document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
    </script>
  </body>
</html>
